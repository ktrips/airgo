# Airgo → Google Cloud Run デプロイ
# トリガー: main への push / 手動実行
# 必要な Secrets: GCP_PROJECT_ID, GCP_SA_KEY
# デプロイ先: https://airgo.ktrips.net

name: Deploy Airgo to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - '**'
  workflow_dispatch:

env:
  REGION: asia-northeast1
  SERVICE_NAME: airgo
  REPO_NAME: airgo-repo
  DOMAIN: airgo.ktrips.net

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure data/public-trips.json exists
        run: |
          mkdir -p data
          if [[ ! -f data/public-trips.json ]]; then
            if [[ -f public-trips.json ]]; then
              cp public-trips.json data/public-trips.json
              echo "public-trips.json を data/ にコピーしました"
            else
              echo '[]' > data/public-trips.json
              echo "⚠ data/public-trips.json がなかったため空の配列を作成しました"
            fi
          fi
          echo "data/public-trips.json: $(wc -c < data/public-trips.json) bytes"

      - name: Install gcloud and authenticate
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if ! command -v gcloud &>/dev/null; then
            curl -sSL https://sdk.cloud.google.com | bash -s -- --disable-prompts --install-dir="$HOME"
            echo "$HOME/google-cloud-sdk/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/google-cloud-sdk/bin:$PATH"
          fi
          python3 -c "
          import os, json
          key = os.environ.get('GCP_SA_KEY', '')
          if not key.strip():
              raise SystemExit('GCP_SA_KEY is empty. Add the service account JSON to GitHub Secrets.')
          try:
              json.loads(key)
          except json.JSONDecodeError as e:
              raise SystemExit(f'GCP_SA_KEY is invalid JSON: {e}. Ensure the full JSON is copied (from { to }).')
          with open('gcp-key.json', 'w') as f:
              f.write(key)
          print('Credentials file created')
          "
          gcloud auth activate-service-account --key-file=gcp-key.json
          gcloud config set project "$GCP_PROJECT_ID"
          rm -f gcp-key.json

      - name: Enable APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com \
            --quiet

      - name: Create Artifact Registry repository
        run: |
          if ! gcloud artifacts repositories describe ${{ env.REPO_NAME }} \
               --location=${{ env.REGION }} --format='value(name)' 2>/dev/null; then
            gcloud artifacts repositories create ${{ env.REPO_NAME }} \
              --repository-format=docker \
              --location=${{ env.REGION }} \
              --description="Airgo container images"
          fi

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest"
          gcloud builds submit --async --tag "${IMAGE_TAG}" --timeout=600 .
          BUILD_ID=$(gcloud builds list --limit=1 --format='value(id)')
          echo "Waiting for build $BUILD_ID..."
          for i in $(seq 1 60); do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' 2>/dev/null || echo "UNKNOWN")
            echo "  Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "✔ Build completed successfully"; break ;;
              FAILURE|CANCELLED|EXPIRED) echo "Build failed with status: $STATUS"; exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - name: Deploy to Cloud Run
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${IMAGE_TAG}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet
          echo "✔ Cloud Run デプロイ完了"

      - name: Map custom domain
        run: |
          if ! gcloud run domain-mappings describe \
               --domain=${{ env.DOMAIN }} --region=${{ env.REGION }} 2>/dev/null; then
            gcloud run domain-mappings create \
              --service=${{ env.SERVICE_NAME }} \
              --domain=${{ env.DOMAIN }} \
              --region=${{ env.REGION }} \
              --quiet || true
          fi

      - name: Deployment summary
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Cloud Run URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Custom domain:** https://${{ env.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
