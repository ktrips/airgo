<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Airgo データ移行用エクスポート</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 2rem auto; padding: 1rem; }
    h1 { font-size: 1.2rem; }
    p { color: #666; font-size: 0.9rem; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; background: #e1306c; color: white; border: none; border-radius: 6px; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log { margin-top: 1rem; font-size: 0.85rem; color: #333; white-space: pre-wrap; }
    .err { color: #c00; }
  </style>
</head>
<body>
  <h1>Airgo データ移行用エクスポート</h1>
  <p>このページは、Airgo アプリと同じオリジン（例: http://localhost:8080）で開いてください。IndexedDB と localStorage から全トリップデータをエクスポートします。容量制限なくダウンロードできます。</p>
  <button id="btn">エクスポートして JSON をダウンロード</button>
  <div id="log"></div>

  <script>
    const DB_NAME = 'airgo';
    const DB_VERSION = 5;
    const STORE_NAME = 'trips';
    const TRAVELOGUE_STORE = 'travelogueHtml';
    const DATA_ANIME_STORE = 'dataAnime';
    const STAMP_PHOTOS_KEY = 'airgo_stamp_photos';

    function log(msg, isErr = false) {
      const el = document.getElementById('log');
      el.innerHTML += (isErr ? '<span class="err">' : '') + msg + (isErr ? '</span>' : '') + '\n';
    }

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve(req.result);
      });
    }

    function getAll(storeName) {
      return openDB().then(db => new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const store = tx.objectStore(storeName);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      }));
    }

    function getTravelogue(tripId) {
      return openDB().then(db => new Promise((resolve, reject) => {
        const tx = db.transaction(TRAVELOGUE_STORE, 'readonly');
        const store = tx.objectStore(TRAVELOGUE_STORE);
        const req = store.get(tripId);
        req.onsuccess = () => resolve(req.result?.html || null);
        req.onerror = () => reject(req.error);
      }));
    }

    function getStampPhotos() {
      try {
        const raw = localStorage.getItem(STAMP_PHOTOS_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (_) { return {}; }
    }

    /** JSON シリアライズ用にサニタイズ（File/Blob/循環参照を除去） */
    function sanitizeForExport(obj, seen = new WeakSet()) {
      if (obj == null || typeof obj === 'number' || typeof obj === 'boolean' || typeof obj === 'string') return obj;
      if (Number.isNaN(obj) || obj === Infinity || obj === -Infinity) return null;
      if (typeof obj === 'function' || obj instanceof File || obj instanceof Blob) return undefined;
      if (Array.isArray(obj)) return obj.map(v => sanitizeForExport(v, seen)).filter(v => v !== undefined);
      if (typeof obj === 'object') {
        if (seen.has(obj)) return undefined;
        seen.add(obj);
        const out = {};
        for (const [k, v] of Object.entries(obj)) {
          const s = sanitizeForExport(v, seen);
          if (s !== undefined) out[k] = s;
        }
        return out;
      }
      return obj;
    }

    function collectStampPhotosForTrip(tripId) {
      const all = getStampPhotos();
      const out = {};
      const prefixes = [tripId + '_', 'public_' + tripId + '_'];
      for (const prefix of prefixes) {
        for (const key of Object.keys(all)) {
          if (key.startsWith(prefix)) {
            const photoIndex = key.slice(prefix.length);
            if (/^\d+$/.test(photoIndex)) out[photoIndex] = all[key];
          }
        }
      }
      return Object.keys(out).length > 0 ? out : null;
    }

    document.getElementById('btn').onclick = async () => {
      const btn = document.getElementById('btn');
      const logEl = document.getElementById('log');
      logEl.innerHTML = '';
      btn.disabled = true;
      try {
        log('IndexedDB から読み込み中…');
        let trips = [], travelogues = [], animeList = [];
        try {
          [trips, travelogues, animeList] = await Promise.all([
            getAll(STORE_NAME).catch(() => []),
            getAll(TRAVELOGUE_STORE).catch(() => []),
            getAll(DATA_ANIME_STORE).catch(() => [])
          ]);
        } catch (e) {
          log('IndexedDB 読み込みエラー: ' + e.message, true);
          throw e;
        }
        log(`トリップ ${trips.length}件、旅行記 ${travelogues.length}件、アニメ ${animeList.length}件`);

        const tripIds = new Set(trips.map(t => t.id));
        const travelogueByTrip = {};
        for (const t of travelogues) {
          if (t.tripId && tripIds.has(t.tripId)) travelogueByTrip[t.tripId] = t.html;
        }

        const animeByTrip = {};
        for (const a of animeList) {
          if (!a.tripId) continue;
          if (!animeByTrip[a.tripId]) animeByTrip[a.tripId] = [];
          animeByTrip[a.tripId].push(a);
        }
        for (const id of Object.keys(animeByTrip)) {
          animeByTrip[id].sort((a, b) => (a.order ?? a.createdAt ?? 0) - (b.order ?? b.createdAt ?? 0));
        }

        const exportData = { trips: [], exportedAt: Date.now() };
        for (const trip of trips) {
          const t = { ...trip };
          if (travelogueByTrip[trip.id]) t.travelogueHtml = travelogueByTrip[trip.id];
          if (animeByTrip[trip.id]?.length) t.animeList = animeByTrip[trip.id];
          const stamps = collectStampPhotosForTrip(trip.id);
          if (stamps) t.stampPhotos = stamps;
          exportData.trips.push(t);
        }

        const sanitized = sanitizeForExport(exportData);
        const callbackUrl = new URLSearchParams(location.search).get('callback');

        if (callbackUrl) {
          const json = JSON.stringify(sanitized);
          try {
            const blob = new Blob([json], { type: 'application/json' });
            const compressedStream = blob.stream().pipeThrough(new CompressionStream('gzip'));
            const compressedBlob = await new Response(compressedStream).blob();
            const r = await fetch(callbackUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Content-Encoding': 'gzip' },
              body: compressedBlob,
            });
            const result = await r.json();
            if (result.ok) {
              log('エクスポート完了！JSON を圧縮してファイルに保存しました。');
              log('次のコマンドで Firestore にアップロード:');
              log('  node scripts/migrate-to-firestore.js airgo_export_for_migrate.json.gz --uid YOUR_FIREBASE_UID');
            } else {
              log('エラー: ' + (result.error || '保存に失敗しました'), true);
            }
          } catch (e) {
            log('エラー: ' + e.message, true);
          }
        } else {
          const filename = 'airgo_export_for_migrate.json.gz';
          /** JSON を gzip 圧縮してストリーミング保存（容量制限なし・メモリ効率良） */
          const saveWithStreaming = async () => {
            const handle = await window.showSaveFilePicker({
              suggestedName: filename,
              types: [
                { accept: { 'application/gzip': ['.gz'] }, description: 'Gzip' },
                { accept: { 'application/json': ['.json'] }, description: 'JSON' },
              ],
            });
            const w = await handle.createWritable();
            const trips = sanitized.trips || [];
            try {
              const compressor = new CompressionStream('gzip');
              const jsonStream = new ReadableStream({
                async start(controller) {
                  controller.enqueue(new TextEncoder().encode('{"trips":['));
                  for (let i = 0; i < trips.length; i++) {
                    if (i > 0) controller.enqueue(new TextEncoder().encode(','));
                    controller.enqueue(new TextEncoder().encode(JSON.stringify(trips[i])));
                    if (trips.length > 10 && i % Math.max(1, Math.floor(trips.length / 10)) === 0) {
                      log(`圧縮・書き込み中… ${i + 1}/${trips.length} 件`);
                    }
                  }
                  controller.enqueue(new TextEncoder().encode(`],"exportedAt":${sanitized.exportedAt}}`));
                  controller.close();
                },
              });
              await jsonStream.pipeThrough(compressor).pipeTo(w);
              log('ダウンロード完了: ' + filename + '（gzip 圧縮）');
            } catch (_) {
              const json = JSON.stringify(sanitized);
              await w.write(json);
              await w.close();
              log('ダウンロード完了: airgo_export_for_migrate.json');
            }
          };

          const saveWithBlob = async () => {
            const json = JSON.stringify(sanitized);
            let blob, downloadName;
            try {
              const compressedStream = new Blob([json]).stream().pipeThrough(new CompressionStream('gzip'));
              blob = await new Response(compressedStream).blob();
              downloadName = filename;
            } catch (_) {
              blob = new Blob([json], { type: 'application/json' });
              downloadName = 'airgo_export_for_migrate.json';
            }
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = downloadName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 2000);
            log('ダウンロード完了: ' + downloadName + (downloadName.endsWith('.gz') ? '（gzip 圧縮）' : ''));
          };

          try {
            if (typeof window.showSaveFilePicker === 'function') {
              await saveWithStreaming();
            } else {
              await saveWithBlob();
            }
            log('次のコマンドで Firestore に移行:');
            log('  node scripts/migrate-to-firestore.js ' + filename + ' --uid YOUR_FIREBASE_UID');
          } catch (e) {
            if (e.name === 'AbortError') {
              log('保存をキャンセルしました。');
              return;
            }
            try {
              await saveWithBlob();
              log('次のコマンドで Firestore に移行:');
              log('  node scripts/migrate-to-firestore.js ' + filename + ' --uid YOUR_FIREBASE_UID');
            } catch (e2) {
              log('エラー: ' + (e2.message || e.message), true);
              throw e2;
            }
          }
        }
      } catch (err) {
        log('エラー: ' + err.message, true);
        console.error(err);
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>
